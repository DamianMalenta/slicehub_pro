<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>SliceHub - Studio Menu Ultimate (Wersja Modułowa)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; user-select: none; overflow: hidden; display: flex; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .nav-btn.active { border-left-color: #ef4444; background: rgba(255,255,255,0.05); color: white; }
        .nav-btn { border-left: 3px solid transparent; transition: 0.2s; }
        .active-tree-item { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); box-shadow: inset 0 0 20px rgba(59,130,246,0.1); }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="flex w-full">

    <aside class="w-64 bg-[#070b14] border-r border-white/5 flex flex-col shrink-0 z-30 shadow-2xl">
        <div class="p-6 border-b border-white/5 bg-gradient-to-r from-red-600 to-red-800">
            <h1 class="font-black text-[12px] uppercase tracking-tighter text-white">SliceHub <span class="font-normal opacity-70">Studio</span></h1>
        </div>
        <nav class="flex-1 overflow-y-auto hide-scrollbar py-4">
            <p class="text-[8px] font-black uppercase text-slate-600 tracking-[0.2em] px-6 mb-4">Główne Menu</p>
            <button onclick="Core.switchView('menu')" id="nav-menu" class="nav-btn active w-full text-left px-6 py-3.5 text-[10px] font-black uppercase text-slate-400 hover:text-white flex items-center gap-3">
                <i class="fa-solid fa-layer-group w-5"></i> Drzewo Menu
            </button>
            <button onclick="Core.switchView('modifiers')" id="nav-modifiers" class="nav-btn w-full text-left px-6 py-3.5 text-[10px] font-black uppercase text-slate-400 hover:text-white flex items-center gap-3">
                <i class="fa-solid fa-wand-magic-sparkles w-5"></i> Modyfikatory
            </button>
        </nav>
        <div class="p-6 border-t border-white/5">
            <button onclick="window.location.href='admin_app.html'" class="w-full py-3 bg-white/5 border border-white/10 rounded-xl text-[9px] font-black uppercase text-slate-500 hover:text-white transition">Wyjdź ze Studio</button>
        </div>
    </aside>

    <aside class="w-80 bg-[#0a0f1c] border-r border-white/5 flex flex-col shrink-0 relative overflow-hidden">
        <header class="h-20 border-b border-white/5 bg-black/20 flex items-center justify-between px-6 shrink-0">
            <div class="flex flex-col">
                <h2 id="middle-column-title" class="font-black text-[12px] uppercase text-white">Struktura</h2>
                <span class="text-[8px] font-bold text-slate-500 uppercase">Zarządzaj hierarchią</span>
            </div>
            <div id="middle-column-actions" class="flex items-center gap-2"></div>
        </header>
        <div id="dynamic-tree-container" class="flex-1 overflow-y-auto p-4 hide-scrollbar space-y-3"></div>
    </aside>

    <main id="inspector-panel" class="flex-1 bg-[#050505] overflow-y-auto hide-scrollbar relative">
        <div id="view-container" class="h-full w-full"></div>
    </main>

    <script src="studio_core.js"></script>
    <script src="studio_item.js"></script>
    <script src="studio_modifiers.js"></script>
    <script src="studio_bulk.js"></script>
    <script src="studio_recipe.js"></script>

</body>
</html>

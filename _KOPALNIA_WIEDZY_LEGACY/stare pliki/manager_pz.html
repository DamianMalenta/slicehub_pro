<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SliceHub - Przyjęcie Towaru (PZ) PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-6 md:p-10 overflow-x-hidden">

    <header class="mb-10 flex justify-between items-end">
        <div>
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">Przyjęcie Zewnętrzne (PZ)</h2>
            <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-2">Inteligentne wprowadzanie faktur ze słownikiem</p>
        </div>
        <button onclick="savePZ()" class="bg-green-600 hover:bg-green-500 text-white px-8 py-4 rounded-xl font-black uppercase tracking-wider text-xs transition shadow-[0_0_20px_rgba(34,197,94,0.3)]">
            Zatwierdź PZ
        </button>
    </header>

    <div class="glass p-8 rounded-3xl border border-white/5 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Numer Dokumentu</label>
                <input type="text" id="pz-number" placeholder="FV/2026/001" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-green-500">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Dostawca</label>
                <input type="text" id="pz-contractor" placeholder="Makro / Selgros" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-green-500">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Magazyn Docelowy</label>
                <select id="pz-warehouse" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-green-500 cursor-pointer">
                    <option value="">Ładowanie...</option>
                </select>
            </div>
        </div>
    </div>

    <div class="glass p-8 rounded-3xl border border-white/5">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-white/10 text-[10px] uppercase text-slate-500 tracking-widest">
                        <th class="pb-4 w-1/3">Nazwa z Faktury (Auto-Mapowanie)</th>
                        <th class="pb-4 w-1/3">Produkt w SliceHub</th>
                        <th class="pb-4 text-center">Ilość</th>
                        <th class="pb-4 text-right">Akcja</th>
                    </tr>
                </thead>
                <tbody id="pz-items"></tbody>
            </table>
        </div>
        <button onclick="addRow()" class="mt-6 text-green-500 font-bold text-[10px] uppercase tracking-widest hover:text-white transition">
            <i class="fa-solid fa-plus mr-2"></i>Kolejna Linia
        </button>
    </div>

    <script>
        let dbProducts = [];
        let dbMappings = [];

        async function api(action, payload = {}) {
            payload.action = action;
            const res = await fetch('api_inventory.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return await res.json();
        }

        async function init() {
            const res = await api('get_pz_init');
            if(res.status === 'success') {
                dbProducts = res.payload.products;
                dbMappings = res.payload.mappings; // <--- Odbieramy słownik
                
                const wh = document.getElementById('pz-warehouse');
                wh.innerHTML = '<option value="">-- Wybierz --</option>' + 
                    res.payload.warehouses.map(w => `<option value="${w.id}">${w.name}</option>`).join('');
                
                addRow();
            }
        }

        function addRow() {
            const tbody = document.getElementById('pz-items');
            const tr = document.createElement('tr');
            tr.className = "border-b border-white/5 group";
            
            let opt = dbProducts.map(p => `<option value="${p.id}">${p.name} (${p.unit})</option>`).join('');
            
            tr.innerHTML = `
                <td class="py-4 pr-4">
                    <input type="text" class="ext-name w-full bg-black/50 border border-white/10 rounded-xl p-3 text-xs font-bold text-white outline-none focus:border-blue-500 transition" placeholder="Wpisz nazwę z faktury..." oninput="checkMapping(this)">
                </td>
                <td class="py-4 pr-4">
                    <select class="item-id w-full bg-black border border-white/10 rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-green-500">
                        <option value="">-- Wybierz ręcznie --</option>
                        ${opt}
                    </select>
                </td>
                <td class="py-4">
                    <input type="number" step="0.001" class="item-qty w-32 mx-auto block bg-black border border-white/10 rounded-xl p-3 text-sm font-bold text-center">
                </td>
                <td class="py-4 text-right">
                    <button onclick="this.closest('tr').remove()" class="text-slate-600 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button>
                </td>`;
            tbody.appendChild(tr);
        }

        // FUNKCJA MAPOWANIA W LOCIE
        function checkMapping(input) {
            const val = input.value.trim().toUpperCase();
            if(!val) return;
            
            const tr = input.closest('tr');
            const select = tr.querySelector('.item-id');
            
            // Szukamy w naszym słowniku
            const match = dbMappings.find(m => m.external_name.toUpperCase() === val);
            
            if(match) {
                select.value = match.product_id;
                select.classList.add('border-blue-500', 'bg-blue-900/10');
                setTimeout(() => select.classList.remove('bg-blue-900/10'), 1000);
            } else {
                select.classList.remove('border-blue-500');
            }
        }

        async function savePZ() {
            const items = Array.from(document.querySelectorAll('#pz-items tr')).map(row => ({
                product_id: row.querySelector('.item-id').value,
                quantity: row.querySelector('.item-qty').value
            })).filter(i => i.product_id && i.quantity > 0);

            const res = await api('save_pz', {
                document_number: document.getElementById('pz-number').value,
                contractor_name: document.getElementById('pz-contractor').value,
                warehouse_id: document.getElementById('pz-warehouse').value,
                items: items
            });
            if(res.status === 'success') { alert("PZ Zatwierdzone pomyślnie!"); window.location.reload(); }
            else { alert(res.error); }
        }

        init();
    </script>
</body>
</html>

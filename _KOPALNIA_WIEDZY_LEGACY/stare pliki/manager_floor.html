<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SliceHub - Manager Sali & Kody QR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .neon-border-purple { border: 1px solid rgba(168, 85, 247, 0.4); box-shadow: 0 0 20px rgba(168, 85, 247, 0.15); }
        
        .table-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .table-card:hover { transform: translateY(-4px); border-color: #a855f7; box-shadow: 0 10px 20px rgba(168, 85, 247, 0.1); }
        
        /* Modal do drukowania QR */
        .print-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-blur: 10px; }
        .print-modal.active { display: flex; }
        
        /* Stylowanie specyficzne dla wydruku fizycznego */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; display: flex; flex-col; align-items: center; justify-content: center; }
        }
    </style>
</head>
<body class="flex h-screen w-screen bg-[#050505]">

    <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <nav class="w-20 bg-[#0a0f1c] border-r border-slate-800 flex flex-col items-center py-6 gap-2 shrink-0 z-[400] relative">
        <div class="w-12 h-12 bg-purple-600 rounded-2xl flex items-center justify-center font-black text-xl mb-8 shadow-[0_0_15px_rgba(168,85,247,0.4)]">SH</div>
        
        <button class="w-full py-4 flex flex-col items-center gap-1 text-slate-500 hover:text-white transition group">
            <i class="fa-solid fa-chart-pie text-2xl group-hover:scale-110 transition"></i>
            <span class="text-[7px] font-black uppercase tracking-widest mt-1">Raporty</span>
        </button>
        
        <button class="w-full py-4 flex flex-col items-center gap-1 text-purple-500 bg-purple-900/10 border-r-2 border-purple-500 transition">
            <i class="fa-solid fa-utensils text-2xl"></i>
            <span class="text-[7px] font-black uppercase tracking-widest mt-1">Sala & QR</span>
        </button>
        
        <div class="flex-1"></div>
        
        <button class="w-full py-4 flex flex-col items-center gap-1 text-slate-500 hover:text-white transition group">
            <i class="fa-solid fa-gear text-2xl group-hover:rotate-90 transition duration-300"></i>
            <span class="text-[7px] font-black uppercase tracking-widest mt-1">System</span>
        </button>
    </nav>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="p-8 border-b border-white/5 bg-[#050505] flex justify-between items-end shrink-0">
            <div>
                <h2 class="text-3xl font-black uppercase italic tracking-tighter text-white">Zarządzanie Salą</h2>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Konfiguracja stolików i generacja kodów QR do zamówień Online</p>
            </div>
            <button onclick="init()" class="bg-white/5 hover:bg-white/10 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase transition border border-white/10 active:scale-95">
                <i class="fa-solid fa-rotate-right mr-2"></i> Odśwież
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-8 hide-scrollbar">
            <div class="flex flex-col lg:flex-row gap-8 items-start h-full">
                
                <div class="w-full lg:w-[400px] shrink-0">
                    <div class="glass p-8 rounded-[32px] neon-border-purple sticky top-0 flex flex-col">
                        <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
                            <h3 id="form-title" class="text-xl font-black uppercase italic text-purple-500 tracking-tighter">Dodaj Stolik</h3>
                            <div class="w-10 h-10 bg-purple-900/20 rounded-full flex items-center justify-center text-purple-500 border border-purple-500/30">
                                <i class="fa-solid fa-chair"></i>
                            </div>
                        </div>
                        
                        <input type="hidden" id="table-id" value="0">
                        
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Numer / Nazwa Stolika</label>
                                <input type="text" id="table-number" placeholder="np. Stolik 5, VIP, Taras" class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-purple-500 transition shadow-inner">
                            </div>
                            
                            <div id="qr-section" class="hidden pt-4 border-t border-white/5">
                                <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3 ml-1">Kod QR Zamówień Online</label>
                                
                                <div class="flex flex-col items-center bg-black/40 border border-white/5 rounded-2xl p-6 mb-4">
                                    <div id="qr-canvas" class="bg-white p-3 rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.1)] mb-4 min-h-[150px] min-w-[150px] flex items-center justify-center">
                                        <i class="fa-solid fa-qrcode text-4xl text-slate-300"></i>
                                    </div>
                                    <input type="text" id="table-qr" readonly class="w-full bg-transparent text-center text-[10px] font-mono text-purple-400 outline-none mb-2" placeholder="Brak tokenu">
                                    
                                    <div class="flex gap-2 w-full mt-2">
                                        <button onclick="generateQR()" class="flex-1 bg-purple-600/20 text-purple-400 border border-purple-500/30 py-3 rounded-xl hover:bg-purple-600 hover:text-white transition font-black uppercase text-[9px] active:scale-95">
                                            <i class="fa-solid fa-rotate mr-1"></i> Generuj Nowy
                                        </button>
                                        <button id="btn-print-qr" onclick="openPrintModal()" class="flex-1 bg-white/10 text-white border border-white/20 py-3 rounded-xl hover:bg-white/20 transition font-black uppercase text-[9px] active:scale-95 hidden">
                                            <i class="fa-solid fa-print mr-1"></i> Drukuj Kod
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="flex gap-3 pt-2">
                                <button onclick="saveTable()" class="flex-1 bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-black uppercase tracking-wider text-xs shadow-lg shadow-purple-500/20 transition active:scale-95">
                                    Zapisz Stolik
                                </button>
                                <button id="cancel-btn" onclick="resetForm()" class="hidden bg-red-600/20 hover:bg-red-600 border border-red-500/30 text-red-500 hover:text-white py-4 px-6 rounded-xl font-black uppercase text-xs transition active:scale-95">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex-1">
                    <div class="glass p-8 rounded-[32px] min-h-[500px]">
                        <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                            <h3 class="text-sm font-black uppercase tracking-widest text-slate-400">Aktywne Stoliki na Sali</h3>
                            <span id="tables-counter" class="bg-white/10 text-white px-3 py-1 rounded-lg text-[10px] font-black">0</span>
                        </div>
                        <div id="tables-grid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-5">
                            </div>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <div id="print-modal" class="print-modal">
        <div class="w-full max-w-sm bg-[#0a0f1c] rounded-[32px] p-8 border border-white/10 shadow-2xl relative flex flex-col items-center text-center">
            <button onclick="document.getElementById('print-modal').classList.remove('active')" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-red-600 transition"><i class="fa-solid fa-xmark"></i></button>
            
            <h3 class="text-xl font-black uppercase italic mb-6 text-purple-500">Podgląd Wydruku</h3>
            
            <div id="print-area" class="bg-white p-8 rounded-2xl flex flex-col items-center justify-center text-black mb-6 border-4 border-dashed border-slate-300 w-64 h-80 relative">
                <div class="absolute top-4 font-black uppercase text-[10px] tracking-widest text-slate-400">Skanuj i Zamów</div>
                <div id="print-qr-canvas" class="mb-4"></div>
                <h2 id="print-table-name" class="text-3xl font-black uppercase italic">Stolik X</h2>
                <div class="absolute bottom-4 font-black uppercase text-[8px] text-slate-500">SliceHub POS</div>
            </div>

            <button onclick="window.print()" class="w-full py-4 bg-purple-600 rounded-xl font-black uppercase text-xs text-white shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:bg-purple-500 active:scale-95 transition">
                <i class="fa-solid fa-print mr-2"></i> Wyślij do drukarki
            </button>
        </div>
    </div>
	<script>
        // 🚀 SYSTEM TOASTÓW (POWIADOMIENIA)
        function showToast(msg, type='info') {
            const toast = document.createElement('div');
            const color = type === 'error' ? 'bg-red-600' : (type === 'success' ? 'bg-green-600' : 'bg-purple-600');
            toast.className = `${color} text-white px-6 py-3 rounded-xl shadow-2xl font-black text-[10px] uppercase tracking-widest transform transition-all duration-300 translate-x-full border border-white/10`;
            toast.innerHTML = type === 'error' ? `<i class="fa-solid fa-triangle-exclamation mr-2"></i> ${msg}` : `<i class="fa-solid fa-check mr-2"></i> ${msg}`;
            document.getElementById('toast-container').appendChild(toast);
            
            setTimeout(()=>toast.classList.remove('translate-x-full'), 10);
            setTimeout(()=> { 
                toast.classList.add('translate-x-full'); 
                setTimeout(()=>toast.remove(), 300); 
            }, 3500);
        }

        // 🚀 KONFIGURACJA KODÓW QR
        let qrcodePreview = null;
        let qrcodePrint = null;
        
        // ZMIEŃ NA ADRES SWOJEJ STRONY / SERWERA:
        const BASE_URL = "https://twojadomena.pl/online_store.html?table="; 

        // 🚀 KOMUNIKACJA Z API (api_floor.php)
        async function api(action, payload = {}) {
            payload.action = action;
            try {
                const res = await fetch('api_floor.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                return await res.json();
            } catch (e) {
                return { status: 'error', error: 'Błąd połączenia z serwerem.' };
            }
        }

        // 🚀 INICJALIZACJA I RENDEROWANIE STOLIKÓW
        async function init() {
            const res = await api('get_floor_init');
            if(res.status === 'success') {
                const grid = document.getElementById('tables-grid');
                const tables = res.payload.tables || [];
                
                document.getElementById('tables-counter').innerText = tables.length;
                
                grid.innerHTML = tables.map(t => `
                    <div class="glass p-6 rounded-[24px] border border-white/5 hover:border-purple-500/50 transition cursor-pointer group relative flex flex-col items-center text-center shadow-lg" onclick="editTable(${t.id}, '${t.table_number}', '${t.qr_key || ''}')">
                        
                        <div class="absolute top-4 left-4 text-[8px] font-black uppercase tracking-widest ${t.status === 'free' ? 'text-green-500' : 'text-blue-500'} bg-black/40 px-2 py-1 rounded">
                            ${t.status === 'free' ? 'Wolny' : 'Zajęty'}
                        </div>
                        
                        <button onclick="event.stopPropagation(); deleteTable(${t.id})" class="absolute top-3 right-3 w-8 h-8 bg-red-900/30 text-red-500 border border-red-500/30 rounded-full flex items-center justify-center hover:bg-red-600 hover:text-white transition opacity-0 group-hover:opacity-100 shadow-lg z-10">
                            <i class="fa-solid fa-trash-can text-[10px]"></i>
                        </button>
                        
                        <i class="fa-solid fa-utensils text-4xl mb-4 mt-2 ${t.status === 'free' ? 'text-slate-600' : 'text-blue-500'} group-hover:text-purple-400 transition drop-shadow-md"></i>
                        <div class="text-2xl font-black italic text-white mb-2 leading-none">${t.table_number}</div>
                        
                        <div class="text-[8px] text-slate-400 font-mono bg-black/60 border border-white/5 px-2 py-1.5 rounded truncate w-full mt-auto">
                            ${t.qr_key ? `<i class="fa-solid fa-qrcode text-purple-500 mr-1"></i> ${t.qr_key}` : '<span class="text-slate-600">BRAK KODU QR</span>'}
                        </div>
                    </div>
                `).join('') || '<div class="col-span-full text-center py-12 text-slate-600 font-black uppercase tracking-widest text-[10px] bg-black/20 rounded-3xl border border-white/5"><i class="fa-solid fa-ghost text-3xl mb-3 block opacity-50"></i>Brak skonfigurowanych stolików. Dodaj pierwszy stolik z lewej strony.</div>';
            } else {
                showToast(res.error, "error");
            }
        }

        // 🚀 RYSOWANIE PRAWDZIWEGO KODU QR
        function drawQR(qrKey, targetElementId) {
            const container = document.getElementById(targetElementId);
            container.innerHTML = ""; // Czyszczenie diva
            
            if (!qrKey) {
                container.innerHTML = '<i class="fa-solid fa-qrcode text-5xl text-slate-600 opacity-50"></i>';
                return null;
            }
            
            const url = BASE_URL + qrKey; // Cały adres z tokenem
            
            // Generacja wizualnego kodu QR
            return new QRCode(container, {
                text: url,
                width: 140,
                height: 140,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // 🚀 EDYCJA STOLIKA
        function editTable(id, num, qr) {
            document.getElementById('table-id').value = id;
            document.getElementById('table-number').value = num;
            document.getElementById('table-qr').value = qr;
            
            document.getElementById('form-title').innerText = "Edytuj Stolik";
            document.getElementById('qr-section').classList.remove('hidden');
            document.getElementById('cancel-btn').classList.remove('hidden');
            
            if(qr && qr.trim() !== '') {
                document.getElementById('btn-print-qr').classList.remove('hidden');
            } else {
                document.getElementById('btn-print-qr').classList.add('hidden');
            }
            
            // Rysuj podgląd kodu w formularzu
            drawQR(qr, 'qr-canvas');
            
            // Scroll dla urządzeń mobilnych
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // 🚀 RESET FORMULARZA
        function resetForm() {
            document.getElementById('table-id').value = "0";
            document.getElementById('table-number').value = "";
            document.getElementById('table-qr').value = "";
            
            document.getElementById('form-title').innerText = "Dodaj Stolik";
            document.getElementById('qr-section').classList.add('hidden');
            document.getElementById('cancel-btn').classList.add('hidden');
            document.getElementById('btn-print-qr').classList.add('hidden');
            
            drawQR(null, 'qr-canvas');
        }

        // 🚀 ZAPIS STOLIKA DO BAZY
        async function saveTable() {
            const id = document.getElementById('table-id').value;
            const num = document.getElementById('table-number').value;
            if(!num) return showToast("Podaj nazwę/numer stolika!", "error");

            const res = await api('save_table', { table_id: id, table_number: num });
            if(res.status === 'success') {
                showToast("Zapisano pomyślnie!", "success");
                resetForm();
                init();
            } else {
                showToast(res.error || "Błąd zapisu", "error");
            }
        }

        // 🚀 GENERACJA NOWEGO KODU QR (TOKENU)
        async function generateQR() {
            const id = document.getElementById('table-id').value;
            if(id === "0") return showToast("Zapisz najpierw stolik, aby wygenerować mu unikalny kod!", "error");
            
            const res = await api('generate_qr', { table_id: id });
            if(res.status === 'success') {
                const newQr = res.payload.qr_key;
                document.getElementById('table-qr').value = newQr;
                document.getElementById('btn-print-qr').classList.remove('hidden');
                
                drawQR(newQr, 'qr-canvas');
                showToast("Wygenerowano nowy kod QR!", "success");
                init(); // Odśwież siatkę, by zaktualizować token w karcie
            } else {
                showToast(res.error || "Błąd generowania", "error");
            }
        }

        // 🚀 USUWANIE STOLIKA
        async function deleteTable(id) {
            if(!confirm("Na pewno usunąć ten stolik na stałe?")) return;
            const res = await api('delete_table', { table_id: id });
            if(res.status === 'success') {
                showToast("Usunięto stolik.", "success");
                if (document.getElementById('table-id').value == id) resetForm();
                init();
            } else {
                showToast(res.error || "Błąd usuwania", "error");
            }
        }

        // 🚀 OBSŁUGA WYDRUKU (PRZYGOTOWANIE MODALA)
        function openPrintModal() {
            const qr = document.getElementById('table-qr').value;
            const num = document.getElementById('table-number').value;
            
            if(!qr) return showToast("Brak kodu QR do wydruku!", "error");
            
            document.getElementById('print-table-name').innerText = num;
            
            // Rysuj kod QR w obszarze do druku
            drawQR(qr, 'print-qr-canvas');
            
            document.getElementById('print-modal').classList.add('active');
        }

        // Uruchomienie przy starcie
        init();
    </script>
</body>
</html>

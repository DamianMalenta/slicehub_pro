<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slicehub Kiosk - Panel Kierownika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        select { -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans overflow-hidden">

    <header class="p-8 flex justify-between items-center border-b border-white/5">
        <div>
            <h1 class="text-3xl font-black italic text-red-600 tracking-tighter uppercase"><i class="fa-solid fa-user-shield text-2xl mr-2"></i> SLICEHUB</h1>
            <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.3em] mt-1">Tajny Panel Kierownika</p>
        </div>
        <div class="text-right">
            <button onclick="logout()" class="bg-white/5 text-slate-400 px-6 py-4 rounded-[20px] font-black uppercase text-[10px] tracking-widest border border-white/10 hover:text-white hover:bg-red-600 transition"><i class="fa-solid fa-power-off mr-2"></i> Wyloguj Kiosk</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-8 lg:p-12">
        <div class="max-w-5xl mx-auto space-y-12">
            
            <div class="text-center mb-12">
                <h2 class="text-4xl lg:text-5xl font-black uppercase italic tracking-tighter">Zgłaszanie Wniosków</h2>
                <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest mt-2">Te dane trafią na pulpit Głównego Szefa</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <div class="glass p-10 rounded-[48px] border border-red-500/20 shadow-2xl relative overflow-hidden flex flex-col justify-between">
                    <div class="absolute -top-10 -right-10 w-40 h-40 bg-red-600/10 rounded-full blur-3xl"></div>
                    <div>
                        <h3 class="text-2xl font-black uppercase italic tracking-tighter text-red-500 mb-8"><i class="fa-solid fa-hand-holding-dollar mr-2"></i> Wydaj Zaliczkę</h3>
                        <div class="space-y-4 relative z-10">
                            <div>
                                <p class="text-[9px] text-slate-500 font-black uppercase ml-4 mb-1 tracking-widest">Dla Kogo?</p>
                                <select id="z-emp" class="w-full p-5 bg-black border border-white/10 rounded-[28px] text-white font-black uppercase text-xs focus:border-red-600 cursor-pointer">
                                    <option value="">-- Wybierz Pracownika --</option>
                                </select>
                            </div>
                            <div>
                                <p class="text-[9px] text-slate-500 font-black uppercase ml-4 mb-1 tracking-widest">Kwota (zł)</p>
                                <input id="z-amount" type="number" step="10" placeholder="np. 100" class="w-full p-5 bg-black border border-white/10 rounded-[28px] text-white font-black text-lg focus:border-red-600">
                            </div>
                            <div>
                                <p class="text-[9px] text-slate-500 font-black uppercase ml-4 mb-1 tracking-widest">Krótki Powód</p>
                                <input id="z-reason" type="text" placeholder="np. Zaliczka na paliwo" class="w-full p-5 bg-black border border-white/10 rounded-[28px] text-white font-black uppercase text-xs focus:border-red-600">
                            </div>
                        </div>
                    </div>
                    <button onclick="submitRequest('zaliczka')" class="w-full bg-red-600 text-white p-6 rounded-[32px] font-black uppercase mt-10 shadow-xl shadow-red-900/40 active:scale-95 transition relative z-10"><i class="fa-solid fa-paper-plane mr-2"></i> Wyślij Wniosek</button>
                </div>

                <div class="glass p-10 rounded-[48px] border border-orange-500/20 shadow-2xl relative overflow-hidden flex flex-col justify-between">
                    <div class="absolute -top-10 -right-10 w-40 h-40 bg-orange-600/10 rounded-full blur-3xl"></div>
                    <div>
                        <h3 class="text-2xl font-black uppercase italic tracking-tighter text-orange-500 mb-8"><i class="fa-solid fa-burger mr-2"></i> Zgłoś Posiłek</h3>
                        <div class="space-y-4 relative z-10">
                            <div>
                                <p class="text-[9px] text-slate-500 font-black uppercase ml-4 mb-1 tracking-widest">Kto jadł?</p>
                                <select id="p-emp" class="w-full p-5 bg-black border border-white/10 rounded-[28px] text-white font-black uppercase text-xs focus:border-orange-600 cursor-pointer">
                                    <option value="">-- Wybierz Pracownika --</option>
                                </select>
                            </div>
                            <div>
                                <p class="text-[9px] text-slate-500 font-black uppercase ml-4 mb-1 tracking-widest">Co zjadł?</p>
                                <input id="p-reason" type="text" placeholder="np. Pizza Capricciosa 32cm" class="w-full p-5 bg-black border border-white/10 rounded-[28px] text-white font-black uppercase text-xs focus:border-orange-600">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <p class="text-[8px] text-slate-500 font-black uppercase ml-4 mb-1 tracking-widest">Płaci Pracownik</p>
                                    <input id="p-amount" type="number" step="0.5" placeholder="Potrąć mu" class="w-full p-5 bg-black border border-white/10 rounded-[28px] text-orange-500 font-black text-center text-sm focus:border-orange-600">
                                </div>
                                <div>
                                    <p class="text-[8px] text-slate-500 font-black uppercase ml-4 mb-1 tracking-widest">Koszt Lokalu</p>
                                    <input id="p-owner-cost" type="number" step="0.5" placeholder="Strata firmy" class="w-full p-5 bg-black border border-white/10 rounded-[28px] text-red-500 font-black text-center text-sm focus:border-orange-600">
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onclick="submitRequest('posilek')" class="w-full bg-orange-600 text-white p-6 rounded-[32px] font-black uppercase mt-10 shadow-xl shadow-orange-900/40 active:scale-95 transition relative z-10"><i class="fa-solid fa-utensils mr-2"></i> Zaksięguj Posiłek</button>
                </div>

            </div>
        </div>
    </main>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-black/95 z-[200] flex flex-col items-center justify-center">
        <i class="fa-solid fa-circle-check text-green-500 text-6xl mb-6"></i>
        <h2 class="text-3xl font-black uppercase italic text-white tracking-tighter">Wysłano do Szefa!</h2>
    </div>

    <script>
        // Sprawdzenie sesji Kiosk Admina (PIN 9999)
        async function checkAdminAuth() {
            const cb = `&_t=${new Date().getTime()}`;
            const r = await fetch('api_auth.php?action=check_session' + cb);
            const d = await r.json();
            if (!d.success || d.role !== 'kiosk_admin') window.location.href = 'kiosk.html';
        }

        // Pobranie aktualnej listy pracowników, żeby kierownik mógł wybrać z listy
        async function loadEmployeesForSelects() {
            const cb = `&_t=${new Date().getTime()}`;
            const r = await fetch('api_auth.php?action=get_employees' + cb);
            const d = await r.json();
            
            if (d.active && d.active.length > 0) {
                let optionsHtml = '<option value="">-- Wybierz Pracownika --</option>';
                d.active.forEach(emp => {
                    optionsHtml += `<option value="${emp.id}">${emp.first_name} (${emp.position})</option>`;
                });
                
                document.getElementById('z-emp').innerHTML = optionsHtml;
                document.getElementById('p-emp').innerHTML = optionsHtml;
            } else {
                const emptyMsg = '<option value="">Brak zatrudnionych pracowników</option>';
                document.getElementById('z-emp').innerHTML = emptyMsg;
                document.getElementById('p-emp').innerHTML = emptyMsg;
            }
        }

        // Główna funkcja wysyłająca wniosek do bazy (i na Pulpit)
        async function submitRequest(type) {
            let empId, amount, reason, ownerCost = 0;

            if (type === 'zaliczka') {
                empId = document.getElementById('z-emp').value;
                amount = document.getElementById('z-amount').value;
                reason = document.getElementById('z-reason').value;
            } else if (type === 'posilek') {
                empId = document.getElementById('p-emp').value;
                amount = document.getElementById('p-amount').value;
                reason = document.getElementById('p-reason').value;
                ownerCost = document.getElementById('p-owner-cost').value || 0;
            }

            if (!empId) return alert('BŁĄD: Musisz wybrać pracownika z listy!');
            if (!amount || !reason) return alert('BŁĄD: Wypełnij wszystkie pola (kwotę i powód)!');

            const fd = new URLSearchParams();
            fd.append('user_id', empId);
            fd.append('type', type);
            fd.append('amount', amount);
            fd.append('reason', reason);
            fd.append('owner_cost', ownerCost);

            try {
                const cb = `&_t=${new Date().getTime()}`;
                const res = await fetch('api_auth.php?action=add_request' + cb, { method: 'POST', body: fd });
                const data = await res.json();

                if (data.success) {
                    // Pokaż zielony ekran sukcesu na 2 sekundy i wyczyść formularz
                    document.getElementById('loading-overlay').classList.remove('hidden');
                    
                    if (type === 'zaliczka') {
                        document.getElementById('z-emp').value = ''; document.getElementById('z-amount').value = ''; document.getElementById('z-reason').value = '';
                    } else {
                        document.getElementById('p-emp').value = ''; document.getElementById('p-amount').value = ''; document.getElementById('p-reason').value = ''; document.getElementById('p-owner-cost').value = '';
                    }

                    setTimeout(() => { document.getElementById('loading-overlay').classList.add('hidden'); }, 2000);
                } else {
                    alert('Nie udało się wysłać: ' + data.error);
                }
            } catch (e) {
                alert('Błąd krytyczny komunikacji z serwerem.');
            }
        }

        async function logout() { 
            const cb = `&_t=${new Date().getTime()}`;
            await fetch('api_auth.php?action=logout' + cb); 
            window.location.href = 'kiosk.html'; 
        }

        // Uruchomienie na start
        checkAdminAuth();
        loadEmployeesForSelects();
    </script>
</body>
</html>

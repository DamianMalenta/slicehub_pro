<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SliceHub - Matryca Stanów</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .negative-stock { color: #ef4444; font-weight: 900; }
        .positive-stock { color: #22c55e; font-weight: 900; }
    </style>
</head>
<body class="p-6 md:p-10">

    <header class="mb-10 flex justify-between items-end">
        <div>
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">Matryca Magazynowa</h2>
            <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-2">Podgląd na żywo (Live Test)</p>
        </div>
        <button onclick="init()" class="bg-white/10 hover:bg-white/20 text-white px-6 py-3 rounded-xl font-black uppercase text-xs transition border border-white/10">
            <i class="fa-solid fa-rotate-right mr-2"></i> Odśwież
        </button>
    </header>

    <div class="glass p-8 rounded-3xl overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-max">
            <thead>
                <tr id="matrix-head" class="border-b border-white/10 text-[10px] uppercase text-slate-500 tracking-widest">
                    <th class="pb-4 pr-4">Produkt</th>
                    <th class="pb-4 pr-4 text-center">J.m.</th>
                    </tr>
            </thead>
            <tbody id="matrix-body">
                <tr><td colspan="5" class="py-10 text-center text-slate-500 font-bold uppercase text-xs">Ładowanie matrycy...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function api(action, payload = {}) {
            payload.action = action;
            const res = await fetch('api_inventory.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return await res.json();
        }

        async function init() {
            const res = await api('get_stock_matrix');
            if(res.status === 'success') {
                const { products, warehouses, stocks } = res.payload;
                
                // 1. Budowanie nagłówków (Kolumny magazynów)
                const thead = document.getElementById('matrix-head');
                let headHtml = `<th class="pb-4 pr-4">Zidentyfikowany Produkt</th><th class="pb-4 pr-4 text-center">J.m.</th>`;
                warehouses.forEach(w => {
                    headHtml += `<th class="pb-4 text-center text-blue-500">${w.name}</th>`;
                });
                thead.innerHTML = headHtml;

                // 2. Budowanie wierszy (Produkty i ich stany)
                const tbody = document.getElementById('matrix-body');
                let bodyHtml = '';

                products.forEach(p => {
                    bodyHtml += `<tr class="border-b border-white/5 hover:bg-white/5 transition">
                                    <td class="py-4 pr-4 font-bold text-xs uppercase">${p.name}</td>
                                    <td class="py-4 pr-4 text-center text-slate-500 text-xs font-black">${p.unit}</td>`;
                    
                    // Szukanie stanu dla każdego magazynu
                    warehouses.forEach(w => {
                        const stockEntry = stocks.find(s => s.product_id === p.id && s.warehouse_id === w.id);
                        const qty = stockEntry ? parseFloat(stockEntry.quantity).toFixed(3) : "0.000";
                        
                        let colorClass = "text-slate-400";
                        if(qty < 0) colorClass = "negative-stock";
                        if(qty > 0) colorClass = "positive-stock";

                        bodyHtml += `<td class="py-4 text-center text-sm font-mono ${colorClass}">${qty}</td>`;
                    });
                    
                    bodyHtml += `</tr>`;
                });

                tbody.innerHTML = bodyHtml;
            } else {
                alert("Błąd pobierania danych: " + res.error);
            }
        }

        // Uruchomienie przy starcie
        init();
    </script>
</body>
</html>

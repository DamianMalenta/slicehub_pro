<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SliceHub - Mapowanie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .neon-border-blue { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="p-6 md:p-10 overflow-x-hidden">

    <header class="mb-10">
        <h2 class="text-4xl font-black italic uppercase tracking-tighter">Słownik Mapowania</h2>
        <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-2">Połącz nazwy z faktur zewnętrznych z Twoimi produktami</p>
    </header>

    <div class="glass p-8 rounded-3xl neon-border-blue mb-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Nazwa na fakturze (zewnętrzna)</label>
                <input type="text" id="map-ext-name" placeholder="np. SER MOZZARELLA BLOK 5KG" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-blue-500 transition">
            </div>
            <div class="flex gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Twój produkt docelowy</label>
                    <select id="map-int-id" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-blue-500 transition cursor-pointer">
                        <option value="">Ładowanie...</option>
                    </select>
                </div>
                <button onclick="saveMapping()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-black uppercase tracking-wider text-xs transition">
                    Połącz
                </button>
            </div>
        </div>
    </div>

    <div class="glass p-8 rounded-3xl">
        <h3 class="text-lg font-black uppercase tracking-widest mb-6">Zapisane powiązania</h3>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-white/10 text-[10px] uppercase text-slate-500 tracking-widest">
                        <th class="pb-4">Fraza z faktury</th>
                        <th class="pb-4">Nasz produkt</th>
                        <th class="pb-4 text-right">Akcja</th>
                    </tr>
                </thead>
                <tbody id="mapping-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let products = [];

        async function api(action, payload = {}) {
            payload.action = action;
            const res = await fetch('api_mapping.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return await res.json();
        }

        async function init() {
            const res = await api('get_mapping_data');
            if(res.status === 'success') {
                products = res.payload.products;
                
                // Select
                const sel = document.getElementById('map-int-id');
                sel.innerHTML = '<option value="">-- Wybierz produkt --</option>' + 
                    products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

                // Tabela
                const tbody = document.getElementById('mapping-list');
                tbody.innerHTML = res.payload.mappings.map(m => `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition">
                        <td class="py-4 font-bold text-slate-300 text-sm">${m.external_name}</td>
                        <td class="py-4 font-black text-blue-400 text-sm italic underline decoration-blue-900 decoration-2 underline-offset-4">${m.internal_name}</td>
                        <td class="py-4 text-right">
                            <button onclick="deleteMapping(${m.id})" class="text-slate-600 hover:text-red-500 transition p-2"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="3" class="text-center py-10 text-slate-500 font-bold">Brak reguł.</td></tr>';
            }
        }

        async function saveMapping() {
            const extName = document.getElementById('map-ext-name').value;
            const intId = document.getElementById('map-int-id').value;
            if(!extName || !intId) return alert("Wypełnij oba pola!");

            const res = await api('add_mapping', { external_name: extName, internal_product_id: intId });
            if(res.status === 'success') {
                document.getElementById('map-ext-name').value = '';
                init();
            }
        }

        async function deleteMapping(id) {
            if(!confirm("Usunąć powiązanie?")) return;
            const res = await api('delete_mapping', { mapping_id: id });
            if(res.status === 'success') init();
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zamów Online - SliceHub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .cart-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; display: none; flex-direction: column; justify-content: flex-end; }
        .cart-modal.active { display: flex; }
        .cat-btn.active { background: #ef4444; color: white; border-color: #ef4444; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="p-4 flex justify-between items-center bg-black/80 backdrop-blur-md border-b border-white/10 z-40 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center font-black text-lg shadow-lg shadow-red-500/30">SH</div>
            <h1 class="font-black text-lg uppercase italic tracking-tighter">SliceHub</h1>
        </div>
        <button onclick="toggleCart()" class="relative bg-white/10 px-4 py-2 rounded-xl border border-white/10 font-black text-xs hover:bg-white/20 transition">
            <i class="fa-solid fa-basket-shopping mr-1"></i> <span id="cart-header-total">0.00 zł</span>
            <span id="cart-badge" class="absolute -top-2 -right-2 w-5 h-5 bg-red-600 text-white rounded-full text-[9px] flex items-center justify-center shadow-lg hidden">0</span>
        </button>
    </header>

    <nav class="p-4 border-b border-white/5 shrink-0 overflow-x-auto hide-scrollbar whitespace-nowrap bg-[#0a0f1c]" id="cat-nav">
        </nav>

    <main class="flex-1 overflow-y-auto p-4 space-y-6 hide-scrollbar pb-24" id="menu-container">
        <div class="flex flex-col items-center justify-center h-full opacity-50">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
            <p class="text-xs font-black uppercase tracking-widest">Wczytywanie menu...</p>
        </div>
    </main>

    <div id="mobile-cart-bar" class="fixed bottom-0 left-0 right-0 p-4 bg-black/90 backdrop-blur-xl border-t border-white/10 z-30 transition-transform translate-y-full flex justify-between items-center">
        <div>
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Twój koszyk</p>
            <p id="bottom-cart-total" class="text-xl font-black text-green-500">0.00 zł</p>
        </div>
        <button onclick="toggleCart()" class="bg-red-600 px-6 py-3 rounded-xl font-black uppercase text-xs shadow-lg shadow-red-500/30 active:scale-95 transition">Zamawiam</button>
    </div>

    <div id="cart-modal" class="cart-modal">
        <div class="bg-[#0a0f1c] w-full h-[90vh] rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] flex flex-col relative border-t border-white/10">
            <button onclick="toggleCart()" class="absolute top-4 right-6 w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-red-600 transition z-50"><i class="fa-solid fa-chevron-down"></i></button>
            
            <div class="p-6 border-b border-white/5 shrink-0">
                <h2 class="text-2xl font-black uppercase italic tracking-tighter mb-1">Twój Koszyk</h2>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Podsumowanie i dostawa</p>
            </div>

            <div class="flex-1 overflow-y-auto p-6 space-y-6 hide-scrollbar relative">
                <div id="cart-items-list" class="space-y-3"></div>

                <div id="checkout-form" class="hidden border-t border-white/10 pt-6 space-y-6">
                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-400 mb-3 tracking-widest">Typ realizacji:</p>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="setOrderType('delivery')" id="btn-type-delivery" class="py-4 bg-red-600 rounded-xl font-black uppercase text-xs transition border border-red-500">Dostawa</button>
                            <button onclick="setOrderType('takeaway')" id="btn-type-takeaway" class="py-4 bg-[#111827] rounded-xl font-black uppercase text-xs transition border border-white/10 text-slate-400">Odbiór Osobisty</button>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <input type="text" id="c-name" placeholder="Imię (Wymagane)" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold outline-none focus:border-red-500">
                        <input type="tel" id="c-phone" placeholder="Telefon (Wymagane)" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold outline-none focus:border-red-500">
                        <input type="text" id="c-addr" placeholder="Ulica, nr domu/mieszkania (Dostawa)" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold outline-none focus:border-red-500">
                        
                        <div class="flex items-center gap-3 bg-black border border-white/10 rounded-xl p-4">
                            <i class="fa-solid fa-clock text-slate-500"></i>
                            <select id="c-time" class="w-full bg-transparent outline-none text-sm font-bold text-white appearance-none">
                                <option value="asap" class="bg-black text-white">Jak najszybciej (ASAP)</option>
                                <option value="12:00" class="bg-black text-white">Na 12:00</option>
                                <option value="14:00" class="bg-black text-white">Na 14:00</option>
                                <option value="18:00" class="bg-black text-white">Na 18:00</option>
                                <option value="20:00" class="bg-black text-white">Na 20:00</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-400 mb-3 tracking-widest">Płatność:</p>
                        <div class="space-y-2">
                            <button onclick="setPayment('online')" id="btn-pay-online" class="w-full py-4 bg-purple-600 rounded-xl font-black uppercase text-xs transition border border-purple-500 flex items-center justify-center gap-2"><i class="fa-solid fa-mobile-screen"></i> BLIK / PayU (Szybko)</button>
                            <button onclick="setPayment('cash')" id="btn-pay-cash" class="w-full py-4 bg-[#111827] rounded-xl font-black uppercase text-xs transition border border-white/10 text-slate-400 flex items-center justify-center gap-2"><i class="fa-solid fa-money-bill-wave"></i> Gotówka przy odbiorze</button>
                            <button onclick="setPayment('card')" id="btn-pay-card" class="w-full py-4 bg-[#111827] rounded-xl font-black uppercase text-xs transition border border-white/10 text-slate-400 flex items-center justify-center gap-2"><i class="fa-solid fa-credit-card"></i> Karta przy odbiorze</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-black/50 border-t border-white/5 shrink-0">
                <button id="btn-submit-order" onclick="submitOrder()" class="w-full py-5 rounded-2xl bg-green-600 hover:bg-green-500 text-white font-black uppercase text-sm shadow-lg shadow-green-500/20 transition active:scale-95 flex justify-center items-center gap-3">
                    Zamawiam i płacę <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="success-screen" class="fixed inset-0 bg-green-600 z-[999] hidden flex-col items-center justify-center text-center p-8">
        <i class="fa-solid fa-circle-check text-7xl text-white mb-6 animate-bounce"></i>
        <h2 class="text-4xl font-black uppercase italic tracking-tighter mb-2 text-white">Sukces!</h2>
        <p class="text-sm font-bold text-green-100 mb-8 max-w-xs">Twoje zamówienie wylądowało w restauracji. Kucharze już odpalają piece!</p>
        <button onclick="location.reload()" class="bg-white text-green-600 px-8 py-4 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition">Wróć do sklepu</button>
    </div>

    <script>
        let state = { categories: [], items: [], cart: [], orderType: 'delivery', payMethod: 'online' };

        async function init() {
            try {
                const res = await fetch('api_online.php', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get_menu' })
                });
                const d = await res.json();
                if(d.status === 'success') {
                    state.categories = d.payload.categories;
                    state.items = d.payload.items;
                    renderCategories();
                    renderMenu(state.categories.length > 0 ? state.categories[0].id : null);
                }
            } catch(e) { console.error("Błąd ładowania menu"); }
        }

        function renderCategories() {
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = state.categories.map((c, index) => 
                `<button onclick="renderMenu(${c.id}, this)" class="cat-btn inline-block px-6 py-2 bg-white/5 rounded-xl text-[10px] font-black uppercase mr-2 border border-white/5 transition ${index === 0 ? 'active' : ''}">${c.name_utf8}</button>`
            ).join('');
        }

        function renderMenu(catId, btn = null) {
            if(btn) {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active', 'bg-red-600', 'text-white', 'border-red-600'));
                btn.classList.add('active', 'bg-red-600', 'text-white', 'border-red-600');
            }
            
            const container = document.getElementById('menu-container');
            const items = state.items.filter(i => i.category_id == catId);
            
            container.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">` + items.map(i => `
                <div class="glass p-5 rounded-[24px] flex flex-col justify-between items-start gap-4 border border-white/5 shadow-lg">
                    <div>
                        <h4 class="font-black uppercase text-sm leading-tight mb-1 text-white">${i.name}</h4>
                        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest line-clamp-2">Pyszne danie z naszej oferty.</p>
                    </div>
                    <div class="flex justify-between items-center w-full mt-2">
                        <span class="text-xl font-black text-green-500 italic">${i.price} <span class="text-xs text-slate-500 not-italic">zł</span></span>
                        <button onclick="addToCart(${i.id})" class="w-10 h-10 bg-white/10 hover:bg-red-600 rounded-xl flex items-center justify-center text-white transition active:scale-90"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            `).join('') + `</div>`;
        }

        function addToCart(itemId) {
            const item = state.items.find(i => i.id == itemId);
            const cartItem = { ...item, qty: 1, removed: [], added: [], comment: "", cart_id: Date.now() };
            state.cart.push(cartItem);
            updateCartUI();
            
            // Animacja koszyka
            const btn = document.querySelector(`button[onclick="addToCart(${itemId})"]`);
            btn.innerHTML = `<i class="fa-solid fa-check"></i>`;
            btn.classList.replace('bg-white/10', 'bg-green-500');
            setTimeout(() => {
                btn.innerHTML = `<i class="fa-solid fa-plus"></i>`;
                btn.classList.replace('bg-green-500', 'bg-white/10');
            }, 1000);
        }

        function updateCartUI() {
            let total = 0;
            state.cart.forEach(i => total += parseFloat(i.price) * i.qty);
            
            document.getElementById('cart-header-total').innerText = total.toFixed(2) + ' zł';
            document.getElementById('bottom-cart-total').innerText = total.toFixed(2) + ' zł';
            
            const badge = document.getElementById('cart-badge');
            if(state.cart.length > 0) {
                badge.innerText = state.cart.length;
                badge.classList.remove('hidden');
                document.getElementById('mobile-cart-bar').classList.remove('translate-y-full');
            } else {
                badge.classList.add('hidden');
                document.getElementById('mobile-cart-bar').classList.add('translate-y-full');
            }

            const list = document.getElementById('cart-items-list');
            if(state.cart.length === 0) {
                list.innerHTML = `<div class="text-center py-10 opacity-50"><i class="fa-solid fa-basket-shopping text-4xl mb-3"></i><p class="text-[10px] font-black uppercase">Koszyk jest pusty</p></div>`;
                document.getElementById('checkout-form').classList.add('hidden');
                document.getElementById('btn-submit-order').classList.add('opacity-50', 'pointer-events-none');
            } else {
                document.getElementById('checkout-form').classList.remove('hidden');
                document.getElementById('btn-submit-order').classList.remove('opacity-50', 'pointer-events-none');
                list.innerHTML = state.cart.map(i => `
                    <div class="bg-black/50 border border-white/5 p-4 rounded-2xl flex justify-between items-center">
                        <div>
                            <p class="text-xs font-black uppercase text-white">${i.qty}x ${i.name}</p>
                            <p class="text-[10px] font-black text-slate-500 mt-1">${(i.price*i.qty).toFixed(2)} zł</p>
                        </div>
                        <button onclick="removeFromCart(${i.cart_id})" class="w-8 h-8 bg-red-600/20 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-600 hover:text-white transition"><i class="fa-solid fa-trash text-[10px]"></i></button>
                    </div>
                `).join('');
            }
        }

        function removeFromCart(cartId) {
            state.cart = state.cart.filter(i => i.cart_id !== cartId);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('active');
        }

        function setOrderType(type) {
            state.orderType = type;
            document.getElementById('btn-type-delivery').className = `py-4 rounded-xl font-black uppercase text-xs transition border ${type === 'delivery' ? 'bg-red-600 border-red-500 text-white' : 'bg-[#111827] border-white/10 text-slate-400'}`;
            document.getElementById('btn-type-takeaway').className = `py-4 rounded-xl font-black uppercase text-xs transition border ${type === 'takeaway' ? 'bg-yellow-600 border-yellow-500 text-white' : 'bg-[#111827] border-white/10 text-slate-400'}`;
            
            const addrInput = document.getElementById('c-addr');
            if(type === 'takeaway') { addrInput.style.display = 'none'; addrInput.value = ''; } 
            else { addrInput.style.display = 'block'; }
        }

        function setPayment(method) {
            state.payMethod = method;
            document.getElementById('btn-pay-online').className = `w-full py-4 rounded-xl font-black uppercase text-xs transition border flex items-center justify-center gap-2 ${method === 'online' ? 'bg-purple-600 border-purple-500 text-white' : 'bg-[#111827] border-white/10 text-slate-400'}`;
            document.getElementById('btn-pay-cash').className = `w-full py-4 rounded-xl font-black uppercase text-xs transition border flex items-center justify-center gap-2 ${method === 'cash' ? 'bg-green-600 border-green-500 text-white' : 'bg-[#111827] border-white/10 text-slate-400'}`;
            document.getElementById('btn-pay-card').className = `w-full py-4 rounded-xl font-black uppercase text-xs transition border flex items-center justify-center gap-2 ${method === 'card' ? 'bg-blue-600 border-blue-500 text-white' : 'bg-[#111827] border-white/10 text-slate-400'}`;
        }

        async function submitOrder() {
            if(state.cart.length === 0) return;
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            const addr = document.getElementById('c-addr').value;
            const time = document.getElementById('c-time').value;

            if(!name || !phone) return alert("Podaj Imię i Telefon!");
            if(state.orderType === 'delivery' && !addr) return alert("Podaj adres dostawy!");

            let total = 0; state.cart.forEach(i => total += parseFloat(i.price) * i.qty);

            const payload = {
                cart: state.cart,
                order_type: state.orderType,
                payment_method: state.payMethod,
                customer_name: name,
                customer_phone: phone,
                address: addr,
                total_price: total.toFixed(2),
                requested_time: time
            };

            document.getElementById('btn-submit-order').innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Wysyłanie...`;

            try {
                const r = await fetch('api_online.php', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'submit_order', ...payload })
                });
                const res = await r.json();
                
                if(res.status === 'success') {
                    document.getElementById('cart-modal').classList.remove('active');
                    document.getElementById('success-screen').style.display = 'flex';
                    state.cart = []; updateCartUI();
                } else {
                    alert("Błąd: " + res.error);
                    document.getElementById('btn-submit-order').innerHTML = `Zamawiam i płacę <i class="fa-solid fa-arrow-right"></i>`;
                }
            } catch(e) {
                alert("Błąd serwera.");
                document.getElementById('btn-submit-order').innerHTML = `Zamawiam i płacę <i class="fa-solid fa-arrow-right"></i>`;
            }
        }

        init();
    </script>
</body>
</html>

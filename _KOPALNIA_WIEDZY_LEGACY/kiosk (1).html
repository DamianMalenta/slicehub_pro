<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SliceHub Kiosk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Montserrat', sans-serif; }
        .pin-dot { border: 2px solid #334155; transition: all 0.2s; }
        .pin-dot.active { background-color: #ef4444; border-color: #ef4444; box-shadow: 0 0 15px #ef4444; }
        .numpad-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: all 0.1s; }
        .numpad-btn:active { background: rgba(239, 68, 68, 0.2); transform: scale(0.95); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-6 overflow-hidden">
    
    <div class="mb-10 text-center">
        <h1 class="text-5xl font-black italic tracking-tighter text-red-600 uppercase">SLICEHUB</h1>
        <p class="text-[10px] font-black tracking-[0.4em] text-slate-500 mt-2 uppercase">Terminal Pracowniczy</p>
    </div>

    <div class="flex space-x-6 mb-12" id="pin-display">
        <div class="pin-dot w-4 h-4 rounded-full"></div>
        <div class="pin-dot w-4 h-4 rounded-full"></div>
        <div class="pin-dot w-4 h-4 rounded-full"></div>
        <div class="pin-dot w-4 h-4 rounded-full"></div>
    </div>

    <div class="grid grid-cols-3 gap-4 w-full max-w-xs">
        <button onclick="press(1)" class="numpad-btn h-20 rounded-3xl text-2xl font-black text-white">1</button>
        <button onclick="press(2)" class="numpad-btn h-20 rounded-3xl text-2xl font-black text-white">2</button>
        <button onclick="press(3)" class="numpad-btn h-20 rounded-3xl text-2xl font-black text-white">3</button>
        <button onclick="press(4)" class="numpad-btn h-20 rounded-3xl text-2xl font-black text-white">4</button>
        <button onclick="press(5)" class="numpad-btn h-20 rounded-3xl text-2xl font-black text-white">5</button>
        <button onclick="press(6)" class="numpad-btn h-20 rounded-3xl text-2xl font-black text-white">6</button>
        <button onclick="press(7)" class="numpad-btn h-20 rounded-3xl text-2xl font-black text-white">7</button>
        <button onclick="press(8)" class="numpad-btn h-20 rounded-3xl text-2xl font-black text-white">8</button>
        <button onclick="press(9)" class="numpad-btn h-20 rounded-3xl text-2xl font-black text-white">9</button>
        <button onclick="clr()" class="numpad-btn h-20 rounded-3xl text-red-500 font-black uppercase text-xs">C</button>
        <button onclick="press(0)" class="numpad-btn h-20 rounded-3xl text-2xl font-black text-white">0</button>
        <button onclick="login()" class="numpad-btn h-20 rounded-3xl text-green-500 text-2xl"><i class="fa-solid fa-arrow-right-to-bracket"></i></button>
    </div>

    <script>
        let pin = "";

        function press(n) {
            if(pin.length < 4) {
                pin += n;
                updateDots();
                if(pin.length === 4) setTimeout(login, 200);
            }
        }

        function clr() { pin = ""; updateDots(); }

        function updateDots() {
            const dots = document.getElementById('pin-display').children;
            for(let i=0; i<4; i++) {
                dots[i].className = i < pin.length ? "pin-dot w-4 h-4 rounded-full active" : "pin-dot w-4 h-4 rounded-full";
            }
        }

        async function login() {
    try {
        // Uderzamy do bramy Kiosku
        const response = await fetch('api_auth_kiosk.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ 
                action: 'login_kiosk', 
                pin: pin  // Używamy zmiennej 'pin', bo tak masz w kodzie wyżej
            })
        });

        const res = await response.json();

        if (res.success) {
            // Sukces -> przekierowanie do panelu obecności
            window.location.href = 'kiosk_attendance.html';
        } else {
            alert(res.error || "Błędny PIN");
            clr();
        }
    } catch(e) {
        console.error("Błąd bramy:", e);
        alert("Błąd połączenia z serwerem Kiosku.");
        clr();
    }
}
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SliceHub - Panel Ekipy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-press { transition: transform 0.1s; }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-6">
    <div class="w-full max-w-sm glass rounded-[40px] p-8 border border-white/10 shadow-2xl text-center relative">
        <h1 class="text-4xl font-black uppercase italic tracking-tighter mb-2">Slice<span class="text-red-500">Hub</span></h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase mb-8 tracking-widest">Aplikacja Pracownicza</p>

        <form id="loginForm"> <input type="text" id="loginInput" placeholder="E-mail lub Login" class="w-full bg-black border border-white/10 rounded-xl p-4 text-xs font-bold outline-none focus:border-red-500 mb-4 text-white text-center" required>
            <input type="password" id="passInput" placeholder="Hasło" class="w-full bg-black border border-white/10 rounded-xl p-4 text-xs font-bold outline-none focus:border-red-500 mb-8 text-white text-center" required>
            <button type="submit" id="submitBtn" class="w-full py-4 bg-white text-black rounded-xl font-black uppercase text-xs shadow-lg btn-press">Zaloguj się</button>
        </form>
        <div id="error-msg" class="hidden text-red-500 font-bold text-xs mt-6 bg-red-500/10 p-3 rounded-xl border border-red-500/30"></div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault(); 
            const err = document.getElementById('error-msg');
            const btn = document.querySelector('button[type="submit"]');
            btn.innerText = "Logowanie...";
            err.classList.add('hidden');

            const fd = new URLSearchParams();
            fd.append('action', 'login');
            fd.append('app', 'ekipa'); // Ważne dla rozpoznania kontekstu "Apki Ekipy"
            fd.append('username', document.getElementById('loginInput').value);
            fd.append('password', document.getElementById('passInput').value);

            try {
                const r = await fetch('api_auth.php', { method: 'POST', body: fd });
                const d = await r.json();
                
                if (d.success) {
                    // Przekierowanie na adres zwrócony przez serwer (waiter.html lub app.html)
                    window.location.href = d.target; 
                } else {
                    err.innerText = d.error || "Błąd logowania.";
                    err.classList.remove('hidden');
                    btn.innerText = "Zaloguj się";
                }
            } catch(error) {
                err.innerText = "Błąd połączenia.";
                err.classList.remove('hidden');
                btn.innerText = "Zaloguj się";
            }
        }

        // Podpięcie zdarzenia
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>

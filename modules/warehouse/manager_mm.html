<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SliceHub — MM Przesunięcie Międzymagazynowe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        input, textarea, select, [contenteditable] { user-select: text; -webkit-user-select: text; }
        .glass { background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); backdrop-filter:blur(10px); }
    </style>
    <link rel="stylesheet" href="../shared/sh_mobile_shell.css">
</head>
<body class="p-6 md:p-10 overflow-x-hidden">

    <header class="mb-10 flex justify-between items-end">
        <div>
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">
                <i class="fa-solid fa-right-left mr-3 text-indigo-400"></i>MM — Przesunięcie
            </h2>
            <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-2">Transfer surowców między magazynami · MmEngine V2</p>
        </div>
        <div class="flex gap-2">
            <a href="index.html" class="glass px-4 py-3 rounded-xl text-xs font-bold uppercase text-slate-400 hover:text-white transition border border-white/10"><i class="fa-solid fa-warehouse mr-2"></i> Hub</a>
        </div>
    </header>

    <div class="glass p-8 rounded-3xl mb-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Magazyn źródłowy</label>
                <select id="mm-source" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-indigo-400 outline-none focus:border-indigo-500 appearance-none transition"></select>
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Magazyn docelowy</label>
                <select id="mm-target" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-emerald-400 outline-none focus:border-emerald-500 appearance-none transition"></select>
            </div>
        </div>

        <div class="p-6 rounded-2xl bg-indigo-950/20 border border-indigo-900/30 flex gap-4 items-end flex-wrap mb-6">
            <div class="flex-1 min-w-[250px]">
                <label class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold mb-2 block">Surowiec (SKU)</label>
                <select id="mm-sku" class="w-full bg-black border border-indigo-900 rounded-xl p-3 text-white font-bold appearance-none outline-none focus:border-indigo-500 transition text-xs"></select>
            </div>
            <div class="w-28">
                <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2 block text-center">Ilość</label>
                <input type="number" id="mm-qty" value="1" step="0.001" min="0" class="w-full bg-black border border-white/10 rounded-xl p-3 text-white font-bold text-center outline-none focus:border-indigo-500 transition">
            </div>
            <button type="button" onclick="window.mmAddLine()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-black uppercase text-xs tracking-widest transition">Dodaj</button>
        </div>

        <table class="w-full text-left border-collapse">
            <thead><tr class="border-b border-white/10 text-[10px] uppercase text-slate-500 tracking-widest">
                <th class="pb-3">Surowiec</th><th class="pb-3 text-center">Ilość</th><th class="pb-3 text-right">Akcja</th>
            </tr></thead>
            <tbody id="mm-lines"><tr><td colspan="3" class="py-16 text-center text-slate-600 font-bold uppercase text-xs italic">Dodaj pozycje powyżej</td></tr></tbody>
        </table>
    </div>

    <button type="button" onclick="window.submitMM()" id="btn-mm-save" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] shadow-lg transition flex justify-center items-center gap-3">
        <i class="fa-solid fa-right-left"></i> Zatwierdź Przesunięcie
    </button>

    <div id="loading-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 hidden flex flex-col justify-center items-center">
        <i class="fa-solid fa-circle-notch fa-spin text-6xl text-indigo-400 mb-6"></i>
        <p class="font-black tracking-[0.3em] uppercase text-indigo-400 text-sm animate-pulse">Przetwarzanie transferu…</p>
    </div>

    <script src="../../core/js/api_client.js"></script>
    <script src="js/warehouse_api.js"></script>
    <script src="js/warehouse_transfer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SliceHub - Słownik Mapowania</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../../core/js/core_validator.js"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        input, textarea, select, [contenteditable] { user-select: text; -webkit-user-select: text; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .neon-border-blue { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); transition: all 0.3s ease; }
        .neon-border-blue:focus-within { box-shadow: 0 0 25px rgba(59, 130, 246, 0.3); }
        
        /* Custom Scrollbar pod tabelę Maximum Pro */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 10px; }
    </style>
    <link rel="stylesheet" href="../shared/sh_mobile_shell.css">
</head>
<body class="p-6 md:p-10 overflow-x-hidden">

    <header class="mb-10 flex justify-between items-end">
        <div>
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">Słownik Mapowania</h2>
            <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-2">
                Połącz nazwy z faktur zewnętrznych z Twoimi produktami <span class="text-blue-500 ml-2"><i class="fa-solid fa-bolt"></i> KSeF Ready</span>
            </p>
        </div>
        <div class="flex items-center gap-3">
            <a href="index.html" class="glass px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-white transition border border-white/10"><i class="fa-solid fa-warehouse mr-2"></i>Hub</a>
            <div class="inline-flex items-center gap-2 bg-blue-900/20 text-blue-400 px-3 py-1 rounded-full border border-blue-500/30 text-[10px] font-bold uppercase tracking-widest" id="validator-status">
                <i class="fa-solid fa-microchip animate-pulse"></i> Validator Aktywny
            </div>
        </div>
    </header>

    <div class="glass p-8 rounded-3xl neon-border-blue mb-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 flex justify-between">
                    <span>Nazwa na fakturze (zewnętrzna)</span>
                    <span class="text-blue-500" id="char-indicator">UTF-8 Zabezpieczony</span>
                </label>
                <input type="text" id="map-ext-name" placeholder="np. SER MOZZARELLA BLOK 5KG" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-blue-500 transition shadow-inner">
            </div>
            <div class="flex gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Twój produkt docelowy</label>
                    <select id="map-int-id" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-blue-500 transition cursor-pointer appearance-none">
                        <option value="">Ładowanie bazy produktów...</option>
                    </select>
                </div>
                <button onclick="saveMapping()" id="btn-save" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-black uppercase tracking-wider text-xs transition relative overflow-hidden group">
                    <span class="relative z-10">Połącz</span>
                    <div class="absolute inset-0 h-full w-0 bg-white/20 group-hover:w-full transition-all duration-300 ease-out z-0"></div>
                </button>
            </div>
        </div>
    </div>
<div class="glass p-8 rounded-3xl">
        <h3 class="text-lg font-black uppercase tracking-widest mb-6 flex justify-between items-center">
            Zapisane powiązania
            <span class="text-[10px] text-slate-500 bg-black/50 px-3 py-1 rounded-lg border border-white/5">Baza: <span id="mapping-count" class="text-blue-400">0</span></span>
        </h3>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-white/10 text-[10px] uppercase text-slate-500 tracking-widest">
                        <th class="pb-4">Fraza z faktury (Dostawca)</th>
                        <th class="pb-4">Nasz produkt docelowy</th>
                        <th class="pb-4 text-right">Akcja</th>
                    </tr>
                </thead>
                <tbody id="mapping-list">
                    <tr><td colspan="3" class="text-center py-10 text-slate-500 font-bold">Ładowanie danych API...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../../core/js/api_client.js"></script>
    <script src="js/warehouse_api.js"></script>
    <script src="js/warehouse_settings_mapping.js"></script>
</body>
</html>

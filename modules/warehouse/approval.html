<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SliceHub — Kolejka Akceptacji INW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        input, textarea, select, [contenteditable] { user-select: text; -webkit-user-select: text; }
        .glass { background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); backdrop-filter:blur(10px); }
    </style>
</head>
<body class="p-6 md:p-10 overflow-x-hidden">

    <header class="mb-8 flex justify-between items-end">
        <div>
            <h2 class="text-4xl font-black italic uppercase tracking-tighter"><i class="fa-solid fa-shield-halved mr-3 text-amber-400"></i>Akceptacja INW</h2>
            <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-2">Dokumenty inwentaryzacji oczekujące na zatwierdzenie (manager / owner)</p>
        </div>
        <a href="index.html" class="glass px-4 py-3 rounded-xl text-xs font-bold uppercase text-slate-400 hover:text-white transition border border-white/10"><i class="fa-solid fa-warehouse mr-2"></i> Hub</a>
    </header>

    <div id="queue" class="space-y-6">
        <p class="text-center text-slate-600 font-bold uppercase text-xs py-20"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Ładowanie kolejki…</p>
    </div>

    <script src="../../core/js/api_client.js"></script>
    <script src="js/warehouse_api.js"></script>
    <script src="js/warehouse_approval.js"></script>
</body>
</html>

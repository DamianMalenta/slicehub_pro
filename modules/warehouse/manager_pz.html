<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SliceHub - Przyjęcie Towaru (PZ) PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    
    <script src="../../core/core_validator.js"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(34, 197, 94, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-10 overflow-x-hidden">

    <header class="mb-10 flex justify-between items-end">
        <div>
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">Przyjęcie Zewnętrzne (PZ)</h2>
            <div class="flex items-center gap-4 mt-2">
                <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Inteligentne wprowadzanie faktur</p>
                <div class="inline-flex items-center gap-2 bg-green-900/20 text-green-400 px-3 py-1 rounded-full border border-green-500/30 text-[10px] font-bold uppercase tracking-widest">
                    <i class="fa-solid fa-microchip animate-pulse"></i> Validator Aktywny
                </div>
            </div>
        </div>
        <button onclick="savePZ()" id="btn-save" class="bg-green-600 hover:bg-green-500 text-white px-8 py-4 rounded-xl font-black uppercase tracking-wider text-xs transition shadow-[0_0_20px_rgba(34,197,94,0.3)] group relative overflow-hidden">
            <span class="relative z-10">Zatwierdź PZ</span>
            <div class="absolute inset-0 h-full w-0 bg-white/20 group-hover:w-full transition-all duration-300 ease-out z-0"></div>
        </button>
    </header>

    <div class="glass p-8 rounded-3xl border border-white/5 mb-8 focus-within:border-green-500/50 transition-colors duration-300">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Numer Dokumentu (ASCII)</label>
                <input type="text" id="pz-number" oninput="this.value = SliceValidator.sanitizeKey(this.value)" placeholder="FV_2026_001" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-green-500 shadow-inner transition">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Dostawca (UTF-8)</label>
                <input type="text" id="pz-contractor" placeholder="Makro / Selgros" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-green-500 shadow-inner transition">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Magazyn Docelowy</label>
                <select id="pz-warehouse" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-green-500 cursor-pointer appearance-none shadow-inner transition">
                    <option value="">Ładowanie bazy magazynów...</option>
                </select>
            </div>
        </div>
    </div>
<div class="glass p-8 rounded-3xl border border-white/5">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-white/10 text-[10px] uppercase text-slate-500 tracking-widest">
                        <th class="pb-4 w-1/3">Nazwa z Faktury (Auto-Mapowanie)</th>
                        <th class="pb-4 w-1/3">Produkt w SliceHub (Docelowy)</th>
                        <th class="pb-4 text-center">Ilość z Faktury</th>
                        <th class="pb-4 text-center">Jednostka Faktury</th>
                        <th class="pb-4 text-right">Akcja</th>
                    </tr>
                </thead>
                <tbody id="pz-items">
                    </tbody>
            </table>
        </div>
        <button onclick="addRow()" class="mt-6 text-green-500 font-bold text-[10px] uppercase tracking-widest hover:text-white transition group">
            <i class="fa-solid fa-plus mr-2 group-hover:rotate-90 transition-transform duration-300"></i>Dodaj Kolejną Linię
        </button>
    </div>
<script src="js/warehouse_pz.js"></script>
</body>
</html>

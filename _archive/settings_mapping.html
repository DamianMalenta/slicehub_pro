<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SliceHub - Słownik Mapowania</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../core/js/api_client.js"></script>
    <script src="../core/js/core_validator.js"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .neon-border-blue { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); transition: all 0.3s ease; }
        .neon-border-blue:focus-within { box-shadow: 0 0 25px rgba(59, 130, 246, 0.3); }
        
        /* Custom Scrollbar pod tabelę Maximum Pro */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-10 overflow-x-hidden">

    <header class="mb-10 flex justify-between items-end">
        <div>
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">Słownik Mapowania</h2>
            <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-2">
                Połącz nazwy z faktur zewnętrznych z Twoimi produktami <span class="text-blue-500 ml-2"><i class="fa-solid fa-bolt"></i> KSeF Ready</span>
            </p>
        </div>
        <div class="text-right hidden md:block">
            <div class="inline-flex items-center gap-2 bg-blue-900/20 text-blue-400 px-3 py-1 rounded-full border border-blue-500/30 text-[10px] font-bold uppercase tracking-widest" id="validator-status">
                <i class="fa-solid fa-microchip animate-pulse"></i> Validator Aktywny
            </div>
        </div>
    </header>

    <div class="glass p-8 rounded-3xl neon-border-blue mb-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 flex justify-between">
                    <span>Nazwa na fakturze (zewnętrzna)</span>
                    <span class="text-blue-500" id="char-indicator">UTF-8 Zabezpieczony</span>
                </label>
                <input type="text" id="map-ext-name" placeholder="np. SER MOZZARELLA BLOK 5KG" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-blue-500 transition shadow-inner">
            </div>
            <div class="flex gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Twój produkt docelowy</label>
                    <select id="map-int-id" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:border-blue-500 transition cursor-pointer appearance-none">
                        <option value="">Ładowanie bazy produktów...</option>
                    </select>
                </div>
                <button onclick="saveMapping()" id="btn-save" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-black uppercase tracking-wider text-xs transition relative overflow-hidden group">
                    <span class="relative z-10">Połącz</span>
                    <div class="absolute inset-0 h-full w-0 bg-white/20 group-hover:w-full transition-all duration-300 ease-out z-0"></div>
                </button>
            </div>
        </div>
    </div>
<div class="glass p-8 rounded-3xl">
        <h3 class="text-lg font-black uppercase tracking-widest mb-6 flex justify-between items-center">
            Zapisane powiązania
            <span class="text-[10px] text-slate-500 bg-black/50 px-3 py-1 rounded-lg border border-white/5">Baza: <span id="mapping-count" class="text-blue-400">0</span></span>
        </h3>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-white/10 text-[10px] uppercase text-slate-500 tracking-widest">
                        <th class="pb-4">Fraza z faktury (Dostawca)</th>
                        <th class="pb-4">Nasz produkt docelowy</th>
                        <th class="pb-4 text-right">Akcja</th>
                    </tr>
                </thead>
                <tbody id="mapping-list">
                    <tr><td colspan="3" class="text-center py-10 text-slate-500 font-bold">Ładowanie danych API...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let products = [];

        // 🛡️ Komunikacja z zabezpieczonym API
        async function api(action, payload = {}) {
            payload.action = action;
            try {
                // Ścieżka do API (Silos 2: Magazyn)
                const res = await fetch('../../api/api_mapping.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                return await res.json();
            } catch (err) {
                console.error("Błąd połączenia z API:", err);
                return { status: 'error', error: 'Błąd sieci lub serwera.' };
            }
        }

        // 🟢 Inicjalizacja i renderowanie danych
        async function init() {
            const res = await api('get_mapping_data');
            
            if(res.status === 'success') {
                products = res.payload.products;
                
                // Renderowanie listy wyboru produktów
                const sel = document.getElementById('map-int-id');
                sel.innerHTML = '<option value="">-- Wybierz produkt z bazy --</option>' + 
                    products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

                // Renderowanie tabeli zmapowanych produktów
                const tbody = document.getElementById('mapping-list');
                const mappings = res.payload.mappings;
                
                document.getElementById('mapping-count').innerText = mappings.length;

                tbody.innerHTML = mappings.map(m => `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition group">
                        <td class="py-4 font-bold text-slate-300 text-sm tracking-wide">
                            <i class="fa-solid fa-file-invoice text-slate-600 mr-2 text-[10px]"></i> ${m.external_name}
                        </td>
                        <td class="py-4 font-black text-blue-400 text-sm italic underline decoration-blue-900 decoration-2 underline-offset-4">
                            <i class="fa-solid fa-box text-blue-900 mr-2 text-[10px]"></i> ${m.internal_name}
                        </td>
                        <td class="py-4 text-right">
                            <button onclick="deleteMapping(${m.id})" class="text-slate-600 hover:text-red-500 transition p-2 bg-black/30 rounded-lg hover:bg-red-500/10 group-hover:opacity-100 opacity-50">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="3" class="text-center py-10 text-slate-500 font-bold">Brak reguł mapowania. Dodaj pierwszą z faktury.</td></tr>';
            } else {
                alert("Błąd ładowania danych: " + res.error);
            }
        }

        // 🟢 Zapis nowego mapowania (Z wykorzystaniem walidacji)
        async function saveMapping() {
            const extNameInput = document.getElementById('map-ext-name');
            let extName = extNameInput.value.trim();
            const intId = document.getElementById('map-int-id').value;

            // 1. Wstępna walidacja interfejsu
            if(!extName || !intId) {
                alert("Wypełnij oba pola, Szefie!");
                return;
            }

            // 2. Czyszczenie nazwy zewnętrznej z niebezpiecznych tagów (XSS protection), ale zostawiamy UTF-8 (polskie znaki)
            extName = extName.replace(/</g, "&lt;").replace(/>/g, "&gt;").toUpperCase();

            // 3. Wysłanie do API
            const res = await api('add_mapping', { external_name: extName, internal_product_id: intId });
            
            if(res.status === 'success') {
                extNameInput.value = ''; // Czyszczenie inputa
                extNameInput.focus();
                init(); // Przeładowanie tabeli
            } else {
                alert("Błąd zapisu: " + res.error);
            }
        }

        // 🟢 Usuwanie z zabezpieczeniem
        async function deleteMapping(id) {
            if(!confirm("Na pewno chcesz usunąć tę regułę mapowania? KSeF nie rozpozna tego produktu przy kolejnej fakturze.")) return;
            
            const res = await api('delete_mapping', { mapping_id: id });
            if(res.status === 'success') {
                init();
            } else {
                alert("Błąd usuwania: " + res.error);
            }
        }

        // Uruchomienie silnika po załadowaniu
        init();
    </script>
</body>
</html>

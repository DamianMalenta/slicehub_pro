<!doctype html>
<html lang="pl" class="h-full">
<head>
  <meta charset="utf-8" />
  <title>GEMA-0 Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/panel.css" />
</head>
<body class="h-full bg-[#0a0a0f] text-slate-100 antialiased selection:bg-fuchsia-500/40">
  <div class="min-h-full flex flex-col">
    <header class="border-b border-white/5 backdrop-blur-md bg-[#0a0a0f]/70">
      <div class="max-w-[1600px] mx-auto px-6 py-4 flex items-center gap-6">
        <div class="flex items-center gap-3">
          <span class="inline-block w-2.5 h-2.5 rounded-full bg-fuchsia-400 shadow-[0_0_18px_rgba(232,121,249,0.8)]"></span>
          <h1 class="text-lg font-semibold tracking-wide">GEMA-0 <span class="text-fuchsia-300">Command Center</span></h1>
          <span class="text-xs text-slate-400 ml-2 hidden md:inline">Lokalne centrum automatyzacji Cursor + Gemini</span>
        </div>
        <div class="ml-auto flex items-center gap-3">
          <div class="flex items-center gap-2 text-xs">
            <span class="text-slate-400">Python</span>
            <span id="status-python" class="px-2 py-0.5 rounded-full bg-white/5 border border-white/10">?</span>
          </div>
          <div class="flex items-center gap-2 text-xs">
            <span class="text-slate-400">Cursor</span>
            <span id="status-cursor" class="px-2 py-0.5 rounded-full bg-white/5 border border-white/10">?</span>
          </div>
          <div class="flex items-center gap-2 text-xs">
            <span class="text-slate-400">Gemini</span>
            <span id="status-gemini" class="px-2 py-0.5 rounded-full bg-white/5 border border-white/10">?</span>
          </div>
          <button id="btn-health" class="text-xs px-3 py-1.5 rounded-md bg-cyan-500/10 text-cyan-200 border border-cyan-400/30 hover:bg-cyan-500/20">Healthcheck</button>
          <button id="btn-panic" class="text-xs px-3 py-1.5 rounded-md bg-rose-500/10 text-rose-200 border border-rose-400/30 hover:bg-rose-500/20">Panic</button>
        </div>
      </div>
    </header>

    <main class="flex-1 max-w-[1600px] w-full mx-auto px-6 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
      <section class="lg:col-span-4 rounded-2xl border border-white/10 bg-white/[0.02] backdrop-blur-md shadow-[0_0_60px_-30px_rgba(168,85,247,0.5)] flex flex-col overflow-hidden">
        <div class="px-5 py-3 border-b border-white/5 flex items-center gap-3">
          <span class="inline-block w-1.5 h-5 rounded-sm bg-gradient-to-b from-fuchsia-400 to-violet-600"></span>
          <h2 class="font-semibold tracking-wide">Gemini</h2>
          <span class="ml-auto text-xs text-slate-400" id="gemini-model">gemini-1.5-flash</span>
        </div>
        <div id="gemini-transcript" class="flex-1 overflow-y-auto px-5 py-4 space-y-3 text-sm"></div>
        <div class="border-t border-white/5 p-3 flex items-center gap-2">
          <button id="btn-gemini-to-cursor" class="text-xs px-3 py-1.5 rounded-md bg-fuchsia-500/10 text-fuchsia-200 border border-fuchsia-400/30 hover:bg-fuchsia-500/20">Gemini -> Cursor</button>
          <select id="gemini-push-target" class="text-xs bg-black/30 border border-white/10 rounded-md px-2 py-1.5">
            <option value="CURSOR_1">CURSOR_1</option>
            <option value="CURSOR_2">CURSOR_2</option>
            <option value="CURSOR_3">CURSOR_3</option>
            <option value="CURSOR_ALL">CURSOR_ALL</option>
          </select>
        </div>
      </section>

      <section class="lg:col-span-5 rounded-2xl border border-white/10 bg-white/[0.02] backdrop-blur-md shadow-[0_0_60px_-30px_rgba(34,211,238,0.45)] flex flex-col overflow-hidden">
        <div class="px-5 py-3 border-b border-white/5 flex items-center gap-3">
          <span class="inline-block w-1.5 h-5 rounded-sm bg-gradient-to-b from-cyan-400 to-sky-600"></span>
          <h2 class="font-semibold tracking-wide">Cursor <span class="text-slate-400 font-normal text-xs ml-2">RPA Bridge</span></h2>
          <span class="ml-auto text-xs text-slate-400" id="cursor-queue-state">kolejka: idle</span>
        </div>
        <div id="cursor-transcript" class="flex-1 overflow-y-auto px-5 py-4 space-y-3 text-sm font-mono"></div>
        <div class="border-t border-white/5 p-3 grid grid-cols-4 gap-2 text-xs">
          <button data-quick="HEALTHCHECK" class="quick px-3 py-1.5 rounded-md bg-white/5 border border-white/10 hover:bg-white/10">Healthcheck</button>
          <button data-quick="DRY PUSH CURSOR_1 @przyklad.md zrob raport" class="quick px-3 py-1.5 rounded-md bg-white/5 border border-white/10 hover:bg-white/10">Dry Push</button>
          <button data-quick="BROADCAST @przyklad.md zrob raport" class="quick px-3 py-1.5 rounded-md bg-white/5 border border-white/10 hover:bg-white/10">Broadcast</button>
          <button data-quick="ZAPISZ nowa_notatka" class="quick px-3 py-1.5 rounded-md bg-white/5 border border-white/10 hover:bg-white/10">Zapisz notatke</button>
        </div>
      </section>

      <aside class="lg:col-span-3 rounded-2xl border border-white/10 bg-white/[0.02] backdrop-blur-md flex flex-col overflow-hidden">
        <div class="px-5 py-3 border-b border-white/5 flex items-center gap-3">
          <span class="inline-block w-1.5 h-5 rounded-sm bg-gradient-to-b from-emerald-400 to-teal-600"></span>
          <h2 class="font-semibold tracking-wide">Audit</h2>
        </div>
        <div class="px-5 py-3 border-b border-white/5">
          <h3 class="text-xs uppercase tracking-widest text-slate-400 mb-2">Kolejka</h3>
          <ul id="queue-list" class="text-xs space-y-1"></ul>
        </div>
        <div class="px-5 py-3 border-b border-white/5 flex items-center gap-3 flex-wrap">
          <label class="flex items-center gap-2 text-[11px] text-slate-300 cursor-pointer select-none">
            <input type="checkbox" id="chk-auto-push" class="rounded border-white/20 bg-black/40" />
            <span>Auto-push <span class="text-slate-500">(.md → Cursor)</span></span>
          </label>
        </div>
        <div class="px-5 py-3 border-b border-white/5">
          <h3 class="text-xs uppercase tracking-widest text-slate-400 mb-2">Notatki</h3>
          <ul id="notes-list" class="text-xs space-y-1 max-h-40 overflow-y-auto"></ul>
        </div>
        <div class="px-5 py-3 flex-1 overflow-hidden flex flex-col">
          <h3 class="text-xs uppercase tracking-widest text-slate-400 mb-2">Live log</h3>
          <div id="log-stream" class="flex-1 overflow-y-auto text-[11px] font-mono space-y-1 pr-1"></div>
        </div>
      </aside>
    </main>

    <footer class="border-t border-white/5 bg-[#0a0a0f]/80 backdrop-blur-md">
      <div class="max-w-[1600px] mx-auto px-6 py-4">
        <form id="command-form" class="flex items-start gap-3">
          <div class="flex-1 relative">
            <textarea id="command-input" rows="2" placeholder='np. PUSH TO CURSOR_1 @raport.md przygotuj kod' class="w-full bg-black/40 border border-white/10 focus:border-fuchsia-400/60 rounded-xl px-4 py-3 text-sm placeholder:text-slate-500 outline-none resize-none font-mono"></textarea>
            <div class="absolute right-3 bottom-3 flex items-center gap-2 text-[11px] text-slate-500">
              <kbd class="px-1.5 py-0.5 bg-white/5 rounded border border-white/10">Ctrl</kbd>+<kbd class="px-1.5 py-0.5 bg-white/5 rounded border border-white/10">Enter</kbd>
              <span>wyslij</span>
            </div>
          </div>
          <div class="flex flex-col gap-2">
            <button type="submit" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-fuchsia-500 to-violet-600 text-white font-semibold shadow-[0_0_30px_-10px_rgba(217,70,239,0.7)] hover:from-fuchsia-400 hover:to-violet-500">Wyslij</button>
            <button type="button" id="btn-as-gemini" class="px-5 py-2 rounded-xl bg-cyan-500/10 text-cyan-200 border border-cyan-400/30 text-xs hover:bg-cyan-500/20">Jako Gemini</button>
          </div>
        </form>
      </div>
    </footer>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
